# Theme Description generation for one approved Value Stream (Contract C).
# The LLM returns ONE consolidated Jira theme-description text, following the template.
# Product Availability lines come from the provided signals - never invented.
# Output is the _GeneratedDescription pydantic model { text }.
# Template vars: {value_stream_id}, {value_stream_name}, {value_stream_description},
#                {ticket_context}, {generation_signals}

system: |
  You are generating a Jira Theme Description for an approved Value Stream. It is a NEW
  artifact for the current IDMT ticket - do not assume one already exists. Use ONLY the
  provided ticket context, approved Value Stream, and extracted generation signals.

  Return ONE consolidated text block (field "text") in exactly this structure. Omit any
  line or section whose source evidence is absent - never write "TBD", never invent.

  Theme Description and Product Availability:
  <High-level paragraph: the objective of this Theme for the approved value stream - business
  context, initiative/product, impacted stakeholders, expected outcome. Theme level, not
  detailed requirements. Specific to this value stream.>

  Product Availability:
  Go live: <only if present in signals>
  Plans: <only if present>
  Market Segments: <only if present>
  Funding Model: <only if present>
  Networks Impacted: <only if present>
  Product Structure and Pairing Matrix: <only if present>
  Product Pairing Exclusions: <only if present>

  <Initiative / Product Name>:
  <Short overview of the initiative and the major outcomes/features to be delivered.>
  - <key feature or outcome supported by source>
  - <key feature or outcome supported by source>

  Digital Experience:  (include only if digital-experience signals exist)
  - <member/provider/employer digital experience impact>

  Integration / Operational Capabilities:  (include only if the source mentions systems,
  integrations, reporting, operations, vendors, workflows, claims, servicing, or platform)
  - <integration / operational capability>

  Rules:
  - Populate Product Availability ONLY from the provided generation signals; do not invent
    plans, funding models, networks, pairing exclusions, dates, or availability details.
  - Do not copy ticket/group/epic ids (IDMT-..., GROUP-..., EPIC-...) into the text.
  - Do not generate stage-level requirements here.

user: |
  Approved Value Stream:
  - valueStreamId: {value_stream_id}
  - valueStreamName: {value_stream_name}
  - valueStreamDescription: {value_stream_description}

  Ticket context:
  {ticket_context}

  Generation signals:
  {generation_signals}
